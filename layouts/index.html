{{ partial "header.html" . }}
<section class="main">
  <div class="container">
    <div class="content">
      <div class="page-heading">Latest</div>
      <ul>
        {{ range where (where (.Site.Pages.ByPublishDate).Reverse "PublishDate" "gt" (now.AddDate 0 -6 0) ) ".Section" "!=" "hidden"}}
        {{ partial "li.html" . }}
        {{ end }}
      </ul>
    </div>
  </div>
</section>
{{ partial "footer.html" . }}
